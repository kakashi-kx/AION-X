<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AION-X GUI</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background: #1e1e1e; color: #f0f0f0; }
        h1 { color: #ff5555; }
        input, button { padding: 10px; font-size: 16px; margin: 5px 0; }
        button { cursor: pointer; background: #ff5555; border: none; color: #fff; }
        button:hover { background: #ff7777; }
        pre { background: #2e2e2e; padding: 15px; overflow-x: auto; }
        .loader { display: none; border: 4px solid #f3f3f3; border-radius: 50%; border-top: 4px solid #ff5555; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 10px 0; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <h1>AION-X Recon GUI</h1>
    <input type="text" id="domainInput" placeholder="Enter domain, e.g., example.com">
    <button onclick="runRecon()">Run Full Recon</button>
    <div class="loader" id="loader"></div>
    <h2>Results:</h2>
    <pre id="output"></pre>

    <script>
        async function runRecon() {
            const domain = document.getElementById('domainInput').value.trim();
            if (!domain) return alert("Please enter a domain!");
            
            const output = document.getElementById('output');
            const loader = document.getElementById('loader');
            output.textContent = '';
            loader.style.display = 'inline-block';

            try {
                const response = await fetch(`http://127.0.0.1:8000/recon?domain=${domain}`);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const data = await response.json();

                // Pretty print JSON
                output.textContent = JSON.stringify(data, null, 2);
            } catch (err) {
                output.textContent = `Error: ${err}`;
            } finally {
                loader.style.display = 'none';
            }
        }
    </script>
</body>
</html>
